syntax = "proto3";

package grpcapi;

option go_package = "github.com/Krunis/manager-o-order/grpcapi";


service Storage{
  rpc GetItem(ItemRequest) returns (ItemResponse);
}

message ItemRequest {
  string id = 1;
  string name = 2;
  uint32 count = 3;
}

message ItemResponse {
    bool accepted = 1;
    string more_info = 2;
}

service Delivery {
  rpc SendToQueue(AddressRequest) returns (AddressResponse);
}

message AddressRequest{
  int32 table = 1;
}

message AddressResponse{
    bool added = 1;
    string more_info = 2;
}

service Confirmation{
    rpc SendConfirmation(ConfirmatorInfoRequest) returns (ConfirmatorInfoResponse);
}

message ConfirmatorInfoRequest {
  string confirmation_employee_id = 1;
  repeated string confirmation_type = 2;
}

message ConfirmatorInfoResponse {
  bool sent = 1;
  
}

service Notification{

}